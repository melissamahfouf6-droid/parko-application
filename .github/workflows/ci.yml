name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  flutter:
    name: Flutter (analyze + test)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: "3.19.6"
          cache: true

      - name: Pub get
        run: flutter pub get

      - name: Generate l10n
        run: flutter gen-l10n

      - name: Analyze
        run: flutter analyze --no-fatal-infos --no-fatal-warnings lib

      - name: Test
        run: flutter test

  backend:
    name: Backend (build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install
        run: npm ci

      - name: Build
        run: npm run build

  docker-build-and-scan:
    name: Docker build + Trivy scan (backend image)
    runs-on: ubuntu-latest
    needs: [flutter, backend]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compute image tag (git SHA)
        id: meta
        run: echo "tag=${GITHUB_SHA}" >> "$GITHUB_OUTPUT"

      - name: Install backend prod dependencies (Linux lockfile check)
        working-directory: backend
        run: npm ci --omit=dev

      - name: Build backend image (tagged by SHA)
        run: |
          docker build --no-cache \
            -t parko-api:${{ steps.meta.outputs.tag }} \
            -f backend/Dockerfile \
            backend

      - name: Verify dependency versions inside image
        run: |
          docker run --rm "parko-api:${{ steps.meta.outputs.tag }}" node -e "
            const check = (name, ok) => {
              const v = require('/app/node_modules/' + name + '/package.json').version;
              console.log(name, v);
              if (!ok(v)) throw new Error(name + ' ' + v);
            };
            check('tar', v => !v.startsWith('6.'));
            check('glob', v => !v.startsWith('10.4.'));
            check('minimatch', v => v !== '9.0.5');
            check('cross-spawn', v => v !== '7.0.3');
          "

      - name: Trivy filesystem scan (backend)
        uses: aquasecurity/trivy-action@v0.24.0
        with:
          scan-type: fs
          scan-ref: backend
          ignore-unfixed: true
          severity: CRITICAL,HIGH
          format: table
          exit-code: 1

      - name: Trivy image scan (backend OS packages)
        uses: aquasecurity/trivy-action@v0.24.0
        with:
          image-ref: parko-api:${{ steps.meta.outputs.tag }}
          # Node library CVEs are checked via backend fs scan + the verify step above.
          # Trivy image "library" scan can false-positive on nested package.json metadata.
          vuln-type: os
          ignore-unfixed: true
          severity: CRITICAL,HIGH
          format: table
          exit-code: 1

