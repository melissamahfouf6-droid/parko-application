name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  flutter:
    name: Flutter (analyze + test)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: "3.19.6"
          cache: true

      - name: Pub get
        run: flutter pub get

      - name: Generate l10n
        run: flutter gen-l10n

      - name: Analyze
        run: flutter analyze --no-fatal-infos --no-fatal-warnings lib

      - name: Test
        run: flutter test

  backend:
    name: Backend (build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install
        run: npm ci

      - name: Build
        run: npm run build

  docker-build-and-scan:
    name: Docker build + Trivy scan (backend image)
    runs-on: ubuntu-latest
    needs: [flutter, backend]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compute image tag (git SHA)
        id: meta
        run: echo "tag=${GITHUB_SHA}" >> "$GITHUB_OUTPUT"

      - name: Build backend image (tagged by SHA)
        run: |
          docker build \
            -t parko-api:${{ steps.meta.outputs.tag }} \
            -f backend/Dockerfile \
            backend

      - name: Trivy filesystem scan (repo)
        uses: aquasecurity/trivy-action@v0.24.0
        with:
          scan-type: fs
          ignore-unfixed: true
          severity: CRITICAL,HIGH
          format: table
          exit-code: 1

      - name: Trivy image scan (backend)
        uses: aquasecurity/trivy-action@v0.24.0
        with:
          image-ref: parko-api:${{ steps.meta.outputs.tag }}
          vuln-type: os,library
          ignore-unfixed: true
          severity: CRITICAL,HIGH
          format: table
          exit-code: 1

