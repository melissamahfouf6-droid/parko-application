apiVersion: apps/v1
kind: Deployment
metadata:
  name: parko-api
  namespace: parko
  labels:
    app.kubernetes.io/name: parko-api
    app.kubernetes.io/component: api
spec:
  # SQLite: single replica until DB is externalized (Postgres).
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app.kubernetes.io/name: parko-api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: parko-api
        app.kubernetes.io/component: api
    spec:
      containers:
        - name: parko-api
          image: parko-api:0.0.0
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 3000
          env:
            - name: NODE_ENV
              value: production
            - name: PORT
              value: "3000"
            - name: PARKO_DB_PATH
              value: /data/parko.db
          volumeMounts:
            - name: data
              mountPath: /data
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /api/healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /api/healthz
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /api/healthz
              port: http
            periodSeconds: 5
            failureThreshold: 24
      volumes:
        - name: data
          emptyDir: {}
